name: "Setup Environment"
description: "A composite action to setup environment with security hardening, checkout, Node.js, and package manager"
inputs:
  pnpm:
    description: "Whether to use pnpm (true) or npm (false)"
    required: false
    default: "false"
  install-flags:
    description: "Additional installation flags"
    required: false
    default: ""
  ref:
    description: "The ref to checkout"
    required: false
    default: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.ref }}
  fetch-depth:
    description: "The fetch depth"
    required: false
    default: 1
  node-version:
    description: "Node.js version to setup"
    required: false
    default: "lts/*"
  use-version-file:
    description: "Whether to use .nvmrc file for Node.js version"
    required: false
    default: "false"
  registry-url:
    description: "Optional registry URL for Node.js setup"
    required: false
    default: ""
  token:
    description: "The token to use for checkout"
    required: false
    default: ${{ github.token }}

runs:
  using: "composite"
  steps:
    - name: Harden Runner
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
        ref: ${{ inputs.ref }}
        fetch-depth: ${{ inputs.fetch-depth }}
        token: ${{ inputs.token }}

    - name: Setup pnpm
      if: inputs.pnpm == 'true'
      uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

    - name: Setup Node.js (with version file)
      if: inputs.use-version-file == 'true'
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: ".nvmrc"
        registry-url: ${{ inputs.registry-url }}
        cache: ${{ inputs.pnpm == 'true' && 'pnpm' || 'npm' }}

    - name: Setup Node.js (with specified version)
      if: inputs.use-version-file != 'true'
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: ${{ inputs.registry-url }}
        cache: ${{ inputs.pnpm == 'true' && 'pnpm' || 'npm' }}

    - name: Install dependencies with pnpm
      if: inputs.pnpm == 'true'
      shell: bash
      run: pnpm install --frozen-lockfile ${{ inputs.install-flags }} # zizmor: ignore[template-injection] intentional

    - name: Install dependencies with npm
      if: inputs.pnpm != 'true'
      shell: bash
      run: npm ci ${{ inputs.install-flags }} # zizmor: ignore[template-injection] intentional
